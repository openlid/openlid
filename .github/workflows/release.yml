name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: build, sign, notarize, publish
    runs-on: macos-latest
    # Only run on initial tag creation or explicit dispatch — never on
    # tag force-update. `github.event.created` is true only when the ref
    # is newly created; it's false when an existing tag is force-pushed.
    # A force-pushed tag would otherwise re-run this workflow, rebuild
    # the (non-deterministic) DMG, replace the release asset, and reset
    # GitHub's download counter while breaking any downstream pinned
    # SHA-256 (Homebrew cask, install scripts, supply-chain refs).
    if: github.event_name == 'workflow_dispatch' || github.event.created
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
          # Never cache ~/.cargo/bin (those binaries are rustup-managed; a
          # stale cached cargo can shadow the freshly-installed toolchain
          # and the next cargo invocation re-runs rustup-init with cargo's
          # subcommand args, which fails with "unexpected argument 'build'").
          # Same fix as ci.yml + coverage.yml.
          cache-bin: "false"

      - name: install create-dmg
        run: brew install create-dmg

      # ─────────────────────────────────────────────────────────────────────
      # Import the Developer ID Application signing certificate into a
      # temporary keychain. The keychain is destroyed at end-of-job (and is
      # a fresh one anyway since the runner is ephemeral); this avoids
      # polluting any future runner snapshot and isolates secrets per-run.
      # ─────────────────────────────────────────────────────────────────────
      - name: import code-signing certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASS="$(uuidgen)"

          # Decode the .p12 to a temp file. `--decode` works on macOS too.
          printf '%s' "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/cert.p12" \
              -k "$KEYCHAIN_PATH" \
              -P "$CERT_PASSWORD" \
              -T /usr/bin/codesign

          # Allow codesign to use the imported key without an interactive
          # password prompt.
          security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Prepend our keychain to the search list so codesign can find it.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify identity is now visible.
          security find-identity -p codesigning -v "$KEYCHAIN_PATH"

          # Wipe the raw .p12 from disk — it lived in $RUNNER_TEMP only as
          # long as `security import` needed it.
          rm -f "$RUNNER_TEMP/cert.p12"

          # Export the keychain path so subsequent steps can reference it.
          echo "BUILD_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: build signed .app bundle
        env:
          PROFILE: release
          SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
        run: ./scripts/build-app-bundle.sh

      - name: resolve version
        id: ver
        env:
          RAW_REF: ${{ github.event.inputs.ref || github.ref_name }}
        run: |
          version="${RAW_REF#refs/tags/}"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────────────────
      # Notarize: zip the signed .app, submit to Apple's notary service,
      # wait for the verdict, staple the ticket onto the .app so it works
      # offline.
      # ─────────────────────────────────────────────────────────────────────
      - name: notarize
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          # Decode the .p8 to a runner-temp path.
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$API_KEY_BASE64" | base64 --decode > "$KEY_PATH"

          # Create the zip notarytool wants (preserves Mach-O signatures
          # better than `zip`).
          ditto -c -k --keepParent target/bundle/OpenLid.app target/bundle/OpenLid-notarize.zip

          # Submit and wait. notarytool exits non-zero if the verdict isn't
          # Accepted, which fails the job.
          xcrun notarytool submit target/bundle/OpenLid-notarize.zip \
              --key "$KEY_PATH" \
              --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER_ID" \
              --wait

          # Staple the notarization ticket so Gatekeeper can validate offline.
          xcrun stapler staple target/bundle/OpenLid.app

          # Final verification: Gatekeeper-level check that matches what a
          # downloader's Mac will do.
          spctl -a -vvv -t install target/bundle/OpenLid.app

          # Wipe the API key from disk.
          rm -f "$KEY_PATH"

      - name: create DMG
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dmg-stage
          cp -R target/bundle/OpenLid.app dmg-stage/
          create-dmg \
            --volname "Open-Lid" \
            --window-pos 200 120 \
            --window-size 600 320 \
            --icon-size 100 \
            --icon "OpenLid.app" 175 120 \
            --hide-extension "OpenLid.app" \
            --app-drop-link 425 120 \
            "OpenLid-${VERSION}.dmg" \
            dmg-stage/

      # Sign + notarize the DMG itself too. The .app is already notarized
      # and stapled (so individual launches work offline); signing the DMG
      # gives a friendlier first-download experience and lets stapler
      # attach the ticket to the DMG container.
      - name: sign and notarize DMG
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_IDENTITY }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          codesign --force --sign "$SIGNING_IDENTITY" --options runtime --timestamp "OpenLid-${VERSION}.dmg"

          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$API_KEY_BASE64" | base64 --decode > "$KEY_PATH"

          xcrun notarytool submit "OpenLid-${VERSION}.dmg" \
              --key "$KEY_PATH" \
              --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER_ID" \
              --wait

          xcrun stapler staple "OpenLid-${VERSION}.dmg"
          spctl -a -vvv -t open --context context:primary-signature "OpenLid-${VERSION}.dmg"

          rm -f "$KEY_PATH"

      - name: generate SHA-256 checksum
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          shasum -a 256 "OpenLid-${VERSION}.dmg" > "OpenLid-${VERSION}.dmg.sha256"
          cat "OpenLid-${VERSION}.dmg.sha256"

      - name: extract release notes from CHANGELOG
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          plain="${VERSION#v}"
          awk -v ver="$plain" '
            $0 ~ "^## \\[" { in_section = (index($0, "[" ver "]") > 0); next }
            in_section { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            printf 'Release %s\n\nSee [CHANGELOG.md](CHANGELOG.md) for details.\n' "$VERSION" > RELEASE_NOTES.md
          fi
          echo "--- RELEASE_NOTES.md ---"
          cat RELEASE_NOTES.md

      - name: publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: true
          files: |
            OpenLid-*.dmg
            OpenLid-*.dmg.sha256

      - name: clean up keychain
        if: always()
        run: |
          if [ -n "${BUILD_KEYCHAIN:-}" ]; then
              security delete-keychain "$BUILD_KEYCHAIN" || true
          fi
