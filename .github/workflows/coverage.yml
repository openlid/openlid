name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Lets the runner mint short-lived OIDC tokens that Codecov verifies
  # against GitHub's public keys. Replaces the need for a long-lived
  # CODECOV_TOKEN secret — uploads authenticate per-job, scoped to the
  # exact workflow + branch + commit.
  id-token: write

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: llvm-cov + codecov
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
          # Never cache ~/.cargo/bin (those binaries are rustup-managed; a
          # stale cached cargo can shadow the freshly-installed toolchain).
          cache-bin: "false"
      - uses: taiki-e/install-action@cargo-llvm-cov

      # Exclude AppKit/IOKit/NSXPC FFI-only modules from per-crate coverage.
      # These call into macOS frameworks that aren't available (or meaningful)
      # under unit-test conditions on CI: no display, no NSXPC peer, no IOKit.
      # The realistic per-crate goal is honest reporting, not vanity numbers.
      #
      # Also excluded:
      #   * Both `main.rs` entry points — process glue around the run loop and
      #     daemon bootstrap. Covering them requires spawning the real
      #     binaries, which is an integration-test surface, not a unit one.
      #   * `crates/helper-protocol` — its single function returns a Clang-
      #     emitted Objective-C Protocol pointer via a C extern. There is no
      #     non-FFI path through that crate to exercise.
      - name: cargo llvm-cov
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex 'crates/(app|helper)/src/(platform|menubar|helper_client|launch_at_login|main_thread|control_server|main\.rs)|crates/helper-protocol/'

      # Authenticate to Codecov via OIDC instead of a static token.
      # Requires:
      #   - `id-token: write` permission (set at the workflow level above).
      #   - The Codecov GitHub App installed on this org (one-click op
      #     during initial Codecov signup; already done).
      # If OIDC ever stops working (Codecov-side outage, OIDC trust-config
      # change, etc.), drop in `token: ${{ secrets.CODECOV_TOKEN }}` here
      # — the action accepts either auth method.
      - name: upload to codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          use_oidc: true
          fail_ci_if_error: false
